<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QueryForge — SQL Interview Prep</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
<style>
:root{--bg:#0c1118;--panel:#121927;--panel-2:#161f30;--line:#243047;--text:#dce6f5;--text-dim:#8294b3;--accent:#5ee6c8;--accent-dim:#2e7d6c;--warn:#ff9b6a;--bad:#ff6b7a;--good:#6ee787;--gold:#ffd166;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--text);font-family:'IBM Plex Mono','Courier New',monospace;min-height:100vh;}
::selection{background:var(--accent-dim);color:#fff;}
.layout{display:flex;min-height:100vh;}
.sidebar{width:230px;min-width:230px;background:#090d14;border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;}
.sb-header{padding:14px 12px 10px;border-bottom:1px solid var(--line);}
.sb-header .logo{color:var(--accent);font-weight:700;font-size:15px;}
.sb-header small{color:var(--text-dim);font-size:10px;display:block;margin-top:2px;}
.sb-random{margin:8px;padding:8px;background:rgba(94,230,200,.08);border:1px solid var(--accent-dim);border-radius:7px;color:var(--accent);font-size:11px;cursor:pointer;font-family:inherit;text-align:center;font-weight:700;}
.sb-random:hover{background:rgba(94,230,200,.18);}
.kbd-help{margin:0 8px 8px;padding:7px 10px;background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:7px;font-size:10px;color:var(--text-dim);line-height:1.7;}
.kbd-help kbd{background:var(--panel-2);border:1px solid var(--line);border-radius:3px;padding:1px 5px;font-size:9px;color:var(--text);}
.topic-btn{width:100%;background:none;border:none;border-bottom:1px solid var(--line);text-align:left;padding:9px 12px;font-size:11px;color:var(--text-dim);cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;transition:all .15s;}
.topic-btn:hover{color:var(--text);background:rgba(255,255,255,.03);}
.topic-btn.active{color:var(--accent);background:rgba(94,230,200,.07);}
.topic-btn .dot{width:6px;height:6px;border-radius:50%;background:var(--line);flex-shrink:0;transition:background .2s;}
.topic-btn.done-topic .dot{background:var(--good);}
.topic-btn.active .dot{background:var(--accent);}
.main{flex:1;min-width:0;padding:22px 20px 80px;}
.topbar{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.brand .mark{color:var(--accent);font-weight:700;font-size:18px;}
.brand .tag{color:var(--text-dim);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;}
.score-pill{font-size:12px;color:var(--gold);border:1px solid rgba(255,209,102,.3);padding:5px 12px;border-radius:20px;background:rgba(255,209,102,.06);}
.score-pill b{font-size:15px;}
.score-bar{display:flex;gap:14px;margin-bottom:14px;font-size:11px;flex-wrap:wrap;}
.sc-item{display:flex;align-items:center;gap:5px;color:var(--text-dim);}
.sc-item .sv{font-weight:700;font-size:14px;}
.sc-item.gold .sv{color:var(--gold);}
.sc-item.green .sv{color:var(--good);}
.sc-item.red .sv{color:var(--bad);}
.rail{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:16px;}
.rail button{width:28px;height:28px;border-radius:5px;border:1px solid var(--line);background:var(--panel);color:var(--text-dim);font-family:inherit;font-size:10px;cursor:pointer;transition:all .12s;}
.rail button:hover{border-color:var(--accent-dim);color:var(--text);}
.rail button.active{background:var(--accent);color:#06140f;border-color:var(--accent);font-weight:700;}
.rail button.done{color:var(--good);border-color:var(--good);}
.rail button.done.active{background:var(--good);color:#06140f;}
.card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:18px 20px;margin-bottom:12px;}
.topic-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);margin-bottom:4px;font-weight:600;}
.card h2{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);font-weight:600;margin-bottom:3px;}
.lvl-title{font-size:17px;font-weight:700;color:var(--text);margin:2px 0 10px;letter-spacing:-.3px;}
.diff{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;margin-left:8px;letter-spacing:.5px;}
.diff.easy{background:rgba(110,231,135,.12);color:var(--good);}
.diff.medium{background:rgba(255,155,106,.12);color:var(--warn);}
.diff.hard{background:rgba(255,107,122,.12);color:var(--bad);}
.diff.job{background:rgba(94,230,200,.15);color:var(--accent);}
.task{color:var(--text);line-height:1.7;font-size:13.5px;margin-bottom:14px;}
.task code{background:var(--panel-2);padding:1px 5px;border-radius:4px;color:var(--accent);font-size:12px;}

/* EXAMPLE — hidden by default */
.example-reveal-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(94,230,200,.06);border:1px solid var(--accent-dim);
  color:var(--accent);font-family:inherit;font-size:11px;
  border-radius:6px;padding:6px 12px;cursor:pointer;margin-bottom:12px;
  transition:all .15s;
}
.example-reveal-btn:hover{background:rgba(94,230,200,.14);}
.example-reveal-btn .warn-tag{color:var(--warn);font-size:10px;}
.example{border-left:3px solid var(--warn);background:var(--panel-2);border-radius:0 8px 8px 0;padding:11px 13px;margin-bottom:12px;display:none;}
.example.visible{display:block;}
.example .label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--warn);margin-bottom:5px;font-weight:600;}
.example pre{margin:0 0 7px;font-size:12px;color:var(--text);white-space:pre-wrap;}
.example .ex-desc{font-size:11.5px;color:var(--text-dim);}

.schema-toggle{cursor:pointer;font-size:11px;color:var(--text-dim);text-decoration:underline;text-underline-offset:3px;margin-bottom:10px;display:inline-block;}
.schema-box{display:none;margin-bottom:10px;}
.schema-box.open{display:block;}
.tbl-grid{display:flex;gap:10px;flex-wrap:wrap;}
.tbl{background:var(--panel-2);border:1px solid var(--line);border-radius:7px;padding:8px 11px;min-width:140px;}
.tbl .tname{color:var(--accent);font-weight:700;font-size:11px;margin-bottom:4px;}
.tbl .col{font-size:10px;color:var(--text-dim);}
.tbl .col b{color:var(--text);font-weight:500;}
textarea#sqlInput{width:100%;min-height:85px;background:#070b12;border:1px solid var(--line);border-radius:8px;color:var(--accent);font-family:inherit;font-size:13.5px;padding:11px 13px;resize:vertical;line-height:1.6;outline:none;}
textarea#sqlInput:focus{border-color:var(--accent-dim);}
.btn-row{display:flex;gap:7px;margin-top:9px;flex-wrap:wrap;align-items:center;}
button.run,button.hint,button.reveal{font-family:inherit;font-size:12px;border-radius:6px;padding:8px 14px;cursor:pointer;border:1px solid transparent;transition:all .15s;}
button.run{background:var(--accent);color:#06140f;font-weight:700;border-color:var(--accent);}
button.run:hover{background:#7af0d6;}
button.hint{background:transparent;border-color:var(--line);color:var(--text-dim);}
button.hint:hover{color:var(--text);border-color:var(--text-dim);}
button.reveal{background:transparent;border-color:var(--bad);color:var(--bad);}
button.reveal:hover{background:rgba(255,107,122,.1);}
.hint-box{margin-top:9px;font-size:12px;color:var(--warn);background:rgba(255,155,106,.08);border:1px solid rgba(255,155,106,.25);padding:8px 11px;border-radius:6px;display:none;}
.hint-box.show{display:block;}
.result-area{margin-top:12px;}
.feedback{padding:9px 13px;border-radius:7px;font-size:12.5px;margin-bottom:10px;display:none;align-items:center;gap:8px;}
.feedback.show{display:flex;}
.feedback.ok{background:rgba(110,231,135,.1);border:1px solid rgba(110,231,135,.35);color:var(--good);}
.feedback.bad{background:rgba(255,107,122,.1);border:1px solid rgba(255,107,122,.35);color:var(--bad);}
.feedback.err{background:rgba(255,155,106,.1);border:1px solid rgba(255,155,106,.35);color:var(--warn);}
.resultset{overflow-x:auto;border:1px solid var(--line);border-radius:7px;}
table.rs{border-collapse:collapse;width:100%;font-size:12px;}
table.rs th{background:var(--panel-2);color:var(--accent);text-align:left;padding:6px 10px;border-bottom:1px solid var(--line);white-space:nowrap;}
table.rs td{padding:5px 10px;border-bottom:1px solid var(--line);color:var(--text);white-space:nowrap;}
table.rs tr:last-child td{border-bottom:none;}
.row-count{font-size:10px;color:var(--text-dim);margin-top:4px;}
.solution-box{margin-top:10px;background:#1a0f12;border:1px solid rgba(255,107,122,.3);border-radius:7px;padding:9px 12px;display:none;}
.solution-box.show{display:block;}
.solution-box .label{font-size:10px;text-transform:uppercase;color:var(--bad);letter-spacing:1.5px;margin-bottom:5px;font-weight:600;}
.solution-box pre{margin:0;color:var(--text);font-size:12px;white-space:pre-wrap;}
.next-row{margin-top:12px;display:none;align-items:center;gap:10px;}
.next-row.show{display:flex;}
button.nextlvl{background:var(--accent);color:#06140f;font-weight:700;border:none;border-radius:6px;padding:9px 18px;font-family:inherit;font-size:12px;cursor:pointer;}
button.nextlvl:hover{background:#7af0d6;}
.nav-arrows{display:flex;gap:6px;}
.nav-arrows button{background:var(--panel-2);color:var(--text-dim);border:1px solid var(--line);border-radius:5px;padding:7px 12px;font-family:inherit;font-size:12px;cursor:pointer;}
.nav-arrows button:hover{color:var(--text);border-color:var(--accent-dim);}
.loading{color:var(--text-dim);font-size:13px;padding:40px 0;text-align:center;}
footer{margin-top:24px;text-align:center;color:var(--text-dim);font-size:10px;}

/* INTERVIEW TIP */
.itip{background:rgba(255,209,102,.05);border:1px solid rgba(255,209,102,.2);border-radius:7px;padding:9px 12px;margin-bottom:12px;font-size:11.5px;color:var(--text-dim);line-height:1.6;}
.itip .itip-label{color:var(--gold);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}

/* CELEBRATION OVERLAY */
#celebration{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;display:none;}
.confetti-piece{position:absolute;width:8px;height:8px;border-radius:2px;animation:fall linear forwards;}
@keyframes fall{
  0%{transform:translateY(-20px) rotate(0deg);opacity:1;}
  100%{transform:translateY(100vh) rotate(720deg);opacity:0;}
}
.trophy-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:var(--panel);border:2px solid var(--gold);border-radius:14px;padding:24px 32px;text-align:center;z-index:10000;animation:popIn .4s ease forwards;pointer-events:none;}
@keyframes popIn{0%{transform:translate(-50%,-50%) scale(0);}60%{transform:translate(-50%,-50%) scale(1.1);}100%{transform:translate(-50%,-50%) scale(1);}}
.trophy-popup .icon{font-size:40px;display:block;margin-bottom:8px;}
.trophy-popup .msg{color:var(--gold);font-size:14px;font-weight:700;}
.trophy-popup .sub{color:var(--text-dim);font-size:11px;margin-top:4px;}

@media(max-width:650px){.layout{flex-direction:column;}.sidebar{width:100%;height:auto;position:relative;border-right:none;border-bottom:1px solid var(--line);}.main{padding:12px 10px 60px;}}
</style>
</head>
<body>
<div id="celebration"></div>

<div class="layout">
<div class="sidebar">
  <div class="sb-header"><div class="logo">QueryForge</div><small>SQL Interview Prep</small></div>
  <button class="sb-random" id="randomBtn">⚡ Random Question</button>
  <div class="kbd-help">
    <kbd>←</kbd> prev &nbsp;|&nbsp; <kbd>→</kbd> next<br>
    <kbd>Ctrl</kbd>+<kbd>Enter</kbd> run query
  </div>
  <div id="topicList"></div>
</div>
<div class="main">
  <div class="topbar">
    <div class="brand"><div class="mark">QueryForge</div><div class="tag">SQLite · Interview Prep</div></div>
    <div class="score-pill">Score: <b id="totalScore">0</b></div>
  </div>
  <div class="score-bar">
    <div class="sc-item gold"><span class="sv" id="s10">0</span> Clean ×10</div>
    <div class="sc-item green"><span class="sv" id="s7">0</span> Example ×7</div>
    <div class="sc-item" style="color:var(--text-dim)"><span class="sv" id="s5" style="color:var(--warn)">0</span> Hint ×5</div>
    <div class="sc-item red"><span class="sv" id="s2">0</span> Revealed ×2</div>
  </div>
  <div class="rail" id="rail"></div>
  <div id="app" class="loading">Booting SQLite engine…</div>
  <footer>Runs entirely in your browser. Nothing is sent anywhere. · <kbd>←</kbd><kbd>→</kbd> to navigate</footer>
</div>
</div>

<script>
// ──────────────────────── SCHEMAS ────────────────────────

const SCHEMAS={
  company:{setup:SCHEMA_COMPANY,tables:[
    {name:'departments',cols:['id INT','name TEXT','budget INT','location TEXT']},
    {name:'employees',cols:['id INT','name TEXT','department TEXT','salary INT','hire_date TEXT','manager_id INT','status TEXT']}
  ]},
  shop:{setup:SCHEMA_SHOP,tables:[
    {name:'customers',cols:['id INT','name TEXT','city TEXT','signup_date TEXT','tier TEXT']},
    {name:'products',cols:['id INT','name TEXT','category TEXT','price INT','stock INT','supplier TEXT']},
    {name:'orders',cols:['id INT','customer_id INT','product_id INT','quantity INT','order_date TEXT','status TEXT']}
  ]},
  emp2:{setup:SCHEMA_EMP2,tables:[
    {name:'emp',cols:['id INT','name TEXT','dept TEXT','salary INT','hire_date TEXT','manager_id INT']}
  ]},
  analytics:{setup:SCHEMA_ANALYTICS,tables:[
    {name:'sessions',cols:['id INT','user_id INT','page TEXT','duration_sec INT','session_date TEXT','device TEXT']},
    {name:'users',cols:['id INT','name TEXT','country TEXT','plan TEXT','created_date TEXT']}
  ]}

// ──────────────────────── LEVELS ────────────────────────
const LEVELS=[
// ── SELECT BASICS ──
{topic:"SELECT Basics",title:"Select All Columns",diff:"easy",schema:"company",
 interviewTip:"Interviewers often start with 'pull all records' to test if you know the basic syntax. Keep it simple.",
 concept:"SELECT * returns every column and row. Use it for exploration, but avoid it in production queries.",
 example:{query:"SELECT * FROM departments;",note:"Returns all 5 department rows with all columns."},
 task:"Return <b>all columns and all rows</b> from the <code>employees</code> table.",
 solution:"SELECT * FROM employees;",orderMatters:false},

{topic:"SELECT Basics",title:"Pick Specific Columns",diff:"easy",schema:"company",
 interviewTip:"Selecting only needed columns is a performance best practice — always mention this in interviews.",
 concept:"List columns you need after SELECT, comma-separated. Avoids fetching unnecessary data.",
 example:{query:"SELECT name, budget FROM departments;",note:"Only name and budget — no id or location."},
 task:"Return only <code>name</code> and <code>salary</code> from <code>employees</code>.",
 solution:"SELECT name, salary FROM employees;",orderMatters:false},

{topic:"SELECT Basics",title:"Column Alias with AS",diff:"easy",schema:"company",
 interviewTip:"Aliases make output readable. In reports/dashboards the column label matters — use AS freely.",
 concept:"AS renames a column in the result set. The table itself is unchanged.",
 example:{query:"SELECT name, budget AS dept_budget FROM departments;",note:"budget appears as dept_budget in output."},
 task:"Return <code>name</code> aliased as <code>emp_name</code> and <code>salary</code> aliased as <code>pay</code> from <code>employees</code>.",
 solution:"SELECT name AS emp_name, salary AS pay FROM employees;",orderMatters:false},

// ── WHERE & FILTERING ──
{topic:"WHERE & Filtering",title:"Basic Filter",diff:"easy",schema:"company",
 interviewTip:"Nearly every real query has a WHERE clause. Interviewers test whether you forget it (full-table scan).",
 concept:"WHERE filters rows before they are returned. Only matching rows are included.",
 example:{query:"SELECT * FROM departments WHERE location='Bengaluru';",note:"Only Bengaluru-based departments."},
 task:"Return all columns for employees with <code>status = 'active'</code>.",
 solution:"SELECT * FROM employees WHERE status='active';",orderMatters:false},

{topic:"WHERE & Filtering",title:"Comparison Operators",diff:"easy",schema:"company",
 interviewTip:"Know >, <, >=, <=, != cold. They work on numbers, dates (as text ISO format), and sometimes strings.",
 concept:"Comparison operators let you filter numeric and date columns precisely.",
 example:{query:"SELECT name, salary FROM employees WHERE salary >= 80000;",note:"Employees earning 80k or more."},
 task:"Return <code>name</code> and <code>salary</code> of employees earning <b>more than 70000</b>.",
 solution:"SELECT name, salary FROM employees WHERE salary > 70000;",orderMatters:false},

{topic:"WHERE & Filtering",title:"BETWEEN Range",diff:"medium",schema:"company",
 interviewTip:"BETWEEN is inclusive on both ends. Always clarify boundary inclusion in interviews.",
 concept:"BETWEEN a AND b is equivalent to col >= a AND col <= b.",
 example:{query:"SELECT name, salary FROM employees WHERE salary BETWEEN 60000 AND 80000;",note:"Employees earning 60k to 80k, inclusive."},
 task:"Return <code>name</code> and <code>hire_date</code> of employees hired <b>between '2020-01-01' and '2021-12-31'</b>.",
 solution:"SELECT name, hire_date FROM employees WHERE hire_date BETWEEN '2020-01-01' AND '2021-12-31';",orderMatters:false},

{topic:"WHERE & Filtering",title:"IS NULL / IS NOT NULL",diff:"medium",schema:"company",
 interviewTip:"NULL is not a value — you cannot use = NULL. This is a classic interview trick question.",
 concept:"IS NULL checks for missing values. = NULL never matches anything in SQL.",
 example:{query:"SELECT name FROM employees WHERE manager_id IS NULL;",note:"Employees with no manager (top-level)."},
 task:"Return <code>name</code> of employees where <code>manager_id IS NOT NULL</code> (they have a manager).",
 solution:"SELECT name FROM employees WHERE manager_id IS NOT NULL;",orderMatters:false},

{topic:"WHERE & Filtering",title:"IN Operator",diff:"medium",schema:"company",
 interviewTip:"IN is shorthand for multiple ORs. It's cleaner and performs similarly. Interviewers love it.",
 concept:"IN (val1, val2, ...) matches any row whose column equals one of the listed values.",
 example:{query:"SELECT name, department FROM employees WHERE department IN ('HR','Finance');",note:"HR and Finance employees only."},
 task:"Return <code>name</code> and <code>department</code> of employees in <code>'Sales'</code> or <code>'Marketing'</code>.",
 solution:"SELECT name, department FROM employees WHERE department IN ('Sales','Marketing');",orderMatters:false},

{topic:"WHERE & Filtering",title:"LIKE Pattern Match",diff:"medium",schema:"company",
 interviewTip:"LIKE with % is a full-table scan — mention indexes on text columns in interviews.",
 concept:"LIKE matches text patterns. % = any characters. _ = exactly one character.",
 example:{query:"SELECT name FROM employees WHERE name LIKE 'A%';",note:"Names beginning with A."},
 task:"Return <code>name</code> of employees whose name ends with <code>'i'</code>.",
 solution:"SELECT name FROM employees WHERE name LIKE '%i';",orderMatters:false},

// ── ORDER BY & LIMIT ──
{topic:"ORDER BY & LIMIT",title:"Sort Results",diff:"easy",schema:"company",
 interviewTip:"Always add ORDER BY when the row sequence matters. Without it, database can return rows in any order.",
 concept:"ORDER BY sorts rows. DESC = descending (high to low). ASC is the default.",
 example:{query:"SELECT name, salary FROM employees ORDER BY salary DESC;",note:"Highest salary at the top."},
 task:"Return <code>name</code> and <code>hire_date</code> sorted by hire_date, <b>oldest hire first</b>.",
 solution:"SELECT name, hire_date FROM employees ORDER BY hire_date ASC;",orderMatters:true},

{topic:"ORDER BY & LIMIT",title:"Top N Results",diff:"easy",schema:"company",
 interviewTip:"'Find the top 5 salespeople' is a classic — always combine ORDER BY + LIMIT.",
 concept:"LIMIT caps how many rows come back. Always pair with ORDER BY for meaningful results.",
 example:{query:"SELECT name, salary FROM employees ORDER BY salary DESC LIMIT 3;",note:"Top 3 earners."},
 task:"Return the <b>5 most recently hired</b> employees: <code>name</code> and <code>hire_date</code>.",
 solution:"SELECT name, hire_date FROM employees ORDER BY hire_date DESC LIMIT 5;",orderMatters:true},

{topic:"ORDER BY & LIMIT",title:"OFFSET — Skip Rows",diff:"medium",schema:"company",
 interviewTip:"OFFSET enables pagination. 'Page 2 of results' is: LIMIT 10 OFFSET 10.",
 concept:"OFFSET n skips the first n rows. Combine with LIMIT for pagination.",
 example:{query:"SELECT name, salary FROM employees ORDER BY salary DESC LIMIT 3 OFFSET 3;",note:"Rows 4–6 by salary rank."},
 task:"Return employees ranked <b>4th to 7th</b> by salary (highest first): <code>name</code> and <code>salary</code>.",
 solution:"SELECT name, salary FROM employees ORDER BY salary DESC LIMIT 4 OFFSET 3;",orderMatters:true},

// ── AGGREGATES ──
{topic:"Aggregate Functions",title:"COUNT, SUM, AVG",diff:"medium",schema:"company",
 interviewTip:"Aggregate functions are everywhere in data interviews. Know COUNT(*) vs COUNT(col) — the latter ignores NULLs.",
 concept:"COUNT(*) counts all rows. AVG, SUM, MIN, MAX operate on a column's values.",
 example:{query:"SELECT COUNT(*) AS total, AVG(salary) AS avg_sal FROM employees;",note:"Total employee count and average salary in one query."},
 task:"Return <code>COUNT(*) AS total_employees</code> and <code>SUM(salary) AS salary_bill</code> from <code>employees</code>.",
 solution:"SELECT COUNT(*) AS total_employees, SUM(salary) AS salary_bill FROM employees;",orderMatters:false},

{topic:"Aggregate Functions",title:"MIN and MAX",diff:"easy",schema:"company",
 interviewTip:"'What is the highest salary?' — always MIN/MAX, never sort + LIMIT 1 (unless you need the actual row).",
 concept:"MIN returns the smallest value, MAX returns the largest in a column.",
 example:{query:"SELECT MIN(budget) AS min_b, MAX(budget) AS max_b FROM departments;",note:"Cheapest and most expensive department budgets."},
 task:"Return <code>min_salary</code> and <code>max_salary</code> from the <code>employees</code> table.",
 solution:"SELECT MIN(salary) AS min_salary, MAX(salary) AS max_salary FROM employees;",orderMatters:false},

// ── GROUP BY ──
{topic:"GROUP BY",title:"GROUP BY Basics",diff:"medium",schema:"company",
 interviewTip:"'How many employees per department?' — GROUP BY is the answer. Must appear after WHERE, before HAVING.",
 concept:"GROUP BY groups rows sharing a value. Aggregates then run per group, not the whole table.",
 example:{query:"SELECT department, COUNT(*) AS headcount FROM employees GROUP BY department;",note:"Employee count per department."},
 task:"Return <code>department</code> and <code>avg_salary</code> (average salary) per department.",
 solution:"SELECT department, AVG(salary) AS avg_salary FROM employees GROUP BY department;",orderMatters:false},

{topic:"GROUP BY",title:"HAVING — Filter Groups",diff:"hard",schema:"company",
 interviewTip:"WHERE filters rows; HAVING filters groups. A very common interview question: 'departments with more than 3 employees'.",
 concept:"HAVING filters the result of GROUP BY. You cannot use WHERE on aggregate values.",
 example:{query:"SELECT department, COUNT(*) AS n FROM employees GROUP BY department HAVING COUNT(*) > 2;",note:"Only departments with more than 2 employees."},
 task:"Return <code>department</code> and <code>avg_salary</code> for departments where average salary is <b>above 60000</b>.",
 solution:"SELECT department, AVG(salary) AS avg_salary FROM employees GROUP BY department HAVING AVG(salary) > 60000;",orderMatters:false},

{topic:"GROUP BY",title:"GROUP BY Multiple Columns",diff:"hard",schema:"shop",
 interviewTip:"Real reports group by multiple dimensions — e.g. category AND supplier simultaneously.",
 concept:"You can group by more than one column. Each unique combination becomes its own group.",
 example:{query:"SELECT category, supplier, COUNT(*) AS n FROM products GROUP BY category, supplier;",note:"Products per category-supplier pair."},
 task:"Return <code>category</code>, <code>supplier</code>, and <code>AVG(price) AS avg_price</code> grouped by both columns.",
 solution:"SELECT category, supplier, AVG(price) AS avg_price FROM products GROUP BY category, supplier;",orderMatters:false},

// ── JOINs ──
{topic:"JOINs",title:"INNER JOIN — Two Tables",diff:"medium",schema:"shop",
 interviewTip:"INNER JOIN is the most common join. It only returns rows where a match exists in BOTH tables.",
 concept:"JOIN (or INNER JOIN) combines rows from two tables where the ON condition is true.",
 example:{query:"SELECT o.id, c.name FROM orders o JOIN customers c ON o.customer_id = c.id LIMIT 4;",note:"Each order paired with its customer's name."},
 task:"Return <code>o.id AS order_id</code> and <code>p.name AS product</code> by joining <code>orders</code> and <code>products</code>.",
 solution:"SELECT o.id AS order_id, p.name AS product FROM orders o JOIN products p ON o.product_id = p.id;",orderMatters:false},

{topic:"JOINs",title:"Three-Table JOIN",diff:"medium",schema:"shop",
 interviewTip:"Chain JOINs when you need data from 3+ tables. Each JOIN adds one more table to the picture.",
 concept:"Chain multiple JOINs to combine 3 or more tables. Each ON clause links two tables.",
 example:{query:"SELECT o.id, c.name, p.name AS prod FROM orders o JOIN customers c ON o.customer_id=c.id JOIN products p ON o.product_id=p.id LIMIT 3;",note:"Order with both customer and product names."},
 task:"Return <code>o.id AS order_id</code>, <code>c.name AS customer</code>, <code>p.name AS product</code>, <code>o.quantity</code> joining all three tables.",
 solution:"SELECT o.id AS order_id, c.name AS customer, p.name AS product, o.quantity FROM orders o JOIN customers c ON o.customer_id=c.id JOIN products p ON o.product_id=p.id;",orderMatters:false},

{topic:"JOINs",title:"LEFT JOIN — Keep Unmatched",diff:"hard",schema:"shop",
 interviewTip:"'Find products that were never ordered' — LEFT JOIN + WHERE right_id IS NULL. Very common interview pattern.",
 concept:"LEFT JOIN returns all rows from the left table plus matches from the right. Unmatched = NULL.",
 example:{query:"SELECT c.name, o.id AS order_id FROM customers c LEFT JOIN orders o ON c.id=o.customer_id;",note:"Every customer appears, even those with no orders (NULL order_id)."},
 task:"Return <code>p.name AS product</code> and <code>o.id AS order_id</code> for <b>every product</b>, including products <b>never ordered</b>.",
 solution:"SELECT p.name AS product, o.id AS order_id FROM products p LEFT JOIN orders o ON p.id=o.product_id;",orderMatters:false},

{topic:"JOINs",title:"Self Join — Manager Names",diff:"hard",schema:"company",
 interviewTip:"Self-joins appear in org chart / hierarchy problems — extremely common in data engineering interviews.",
 concept:"A self join joins a table to itself using aliases. Useful for hierarchical data like employees and their managers.",
 example:{query:"SELECT e.name AS emp, m.name AS mgr FROM employees e LEFT JOIN employees m ON e.manager_id=m.id LIMIT 4;",note:"Each employee with their manager's name. Top-level managers show NULL."},
 task:"Return <code>e.name AS employee</code> and <code>m.name AS manager</code> for all employees using a self join.",
 solution:"SELECT e.name AS employee, m.name AS manager FROM employees e LEFT JOIN employees m ON e.manager_id=m.id;",orderMatters:false},

// ── SUBQUERIES ──
{topic:"Subqueries",title:"Subquery with IN",diff:"hard",schema:"shop",
 interviewTip:"Subqueries with IN are readable and common. Mention that EXISTS can be more efficient on large tables.",
 concept:"A subquery inside IN runs first; its results feed the outer WHERE. Think of it as a dynamic list.",
 example:{query:"SELECT name FROM customers WHERE id IN (SELECT customer_id FROM orders WHERE status='returned');",note:"Customers who made at least one return."},
 task:"Return <code>name</code> of products that have been ordered at least once (id appears in <code>orders</code>).",
 solution:"SELECT name FROM products WHERE id IN (SELECT product_id FROM orders);",orderMatters:false},

{topic:"Subqueries",title:"Above-Average Salary",diff:"hard",schema:"company",
 interviewTip:"'Employees earning above the company average' is a classic interview question solved with a scalar subquery.",
 concept:"A scalar subquery returns one value and can be used in a comparison like any number.",
 example:{query:"SELECT name, salary FROM employees WHERE salary > (SELECT AVG(salary) FROM employees WHERE department='Sales');",note:"Employees earning above the Sales dept average."},
 task:"Return <code>name</code> and <code>salary</code> of employees earning <b>more than the overall average salary</b>.",
 solution:"SELECT name, salary FROM employees WHERE salary > (SELECT AVG(salary) FROM employees);",orderMatters:false},

{topic:"Subqueries",title:"NOT EXISTS — Anti-Join",diff:"hard",schema:"shop",
 interviewTip:"NOT EXISTS is the clearest way to express 'find customers who have NOT done X'. More explicit than LEFT JOIN + IS NULL.",
 concept:"NOT EXISTS returns rows where the subquery finds no matching row. Great for 'find records with no related record'.",
 example:{query:"SELECT name FROM customers c WHERE NOT EXISTS (SELECT 1 FROM orders o WHERE o.customer_id=c.id AND o.status='returned');",note:"Customers who never made a return."},
 task:"Return <code>name</code> of products where <b>no order</b> exists with <code>status='pending'</code> for that product.",
 solution:"SELECT name FROM products p WHERE NOT EXISTS (SELECT 1 FROM orders o WHERE o.product_id=p.id AND o.status='pending');",orderMatters:false},

// ── WINDOW FUNCTIONS ──
{topic:"Window Functions",title:"ROW_NUMBER — Rank Rows",diff:"hard",schema:"company",
 interviewTip:"ROW_NUMBER() is the most asked window function in data/analytics interviews. Know OVER(PARTITION BY ... ORDER BY ...).",
 concept:"ROW_NUMBER() assigns a unique sequential number per partition, ordered by a column — without collapsing rows like GROUP BY.",
 example:{query:"SELECT name, department, salary, ROW_NUMBER() OVER(ORDER BY salary DESC) AS overall_rank FROM employees;",note:"Ranks every employee globally by salary."},
 task:"Return <code>name</code>, <code>department</code>, <code>salary</code>, and <code>dept_rank</code> = ROW_NUMBER() OVER(PARTITION BY department ORDER BY salary DESC).",
 solution:"SELECT name, department, salary, ROW_NUMBER() OVER(PARTITION BY department ORDER BY salary DESC) AS dept_rank FROM employees;",orderMatters:false},

{topic:"Window Functions",title:"RANK — Handle Ties",diff:"hard",schema:"company",
 interviewTip:"RANK() gives the same number to ties but skips the next rank (1,1,3). DENSE_RANK does not skip (1,1,2). Interviewers ask the difference.",
 concept:"RANK() is like ROW_NUMBER() but tied values get the same rank, and the next rank number skips accordingly.",
 example:{query:"SELECT name, salary, RANK() OVER(ORDER BY salary DESC) AS rnk FROM employees LIMIT 5;",note:"Two employees with same salary get the same rank."},
 task:"Return <code>name</code>, <code>salary</code>, and <code>salary_rank</code> using RANK() ordered by salary descending.",
 solution:"SELECT name, salary, RANK() OVER(ORDER BY salary DESC) AS salary_rank FROM employees;",orderMatters:false},

{topic:"Window Functions",title:"SUM OVER — Running Total",diff:"hard",schema:"analytics",
 interviewTip:"Running totals (cumulative sums) are a key analytics interview pattern. SUM(...) OVER(ORDER BY date) is the formula.",
 concept:"SUM(col) OVER(ORDER BY date_col) adds up values cumulatively — each row includes all previous rows' total.",
 example:{query:"SELECT session_date, duration_sec, SUM(duration_sec) OVER(ORDER BY session_date) AS running_total FROM sessions WHERE user_id=101;",note:"Cumulative time spent by user 101 across their sessions."},
 task:"Return <code>session_date</code>, <code>duration_sec</code>, and <code>running_total</code> = cumulative SUM of duration_sec ordered by session_date, for all sessions.",
 solution:"SELECT session_date, duration_sec, SUM(duration_sec) OVER(ORDER BY session_date) AS running_total FROM sessions;",orderMatters:false},

{topic:"Window Functions",title:"LAG — Previous Row Value",diff:"job",schema:"analytics",
 interviewTip:"LAG and LEAD compare a row to its neighbor — used for 'how much did sales grow vs last month?' problems.",
 concept:"LAG(col, n) returns the value from n rows before the current row within the partition/order.",
 example:{query:"SELECT session_date, duration_sec, LAG(duration_sec,1) OVER(ORDER BY session_date) AS prev_duration FROM sessions WHERE user_id=101;",note:"Each session compared to the previous one's duration."},
 task:"Return <code>session_date</code>, <code>duration_sec</code>, and <code>prev_duration</code> = LAG(duration_sec,1) OVER(ORDER BY session_date) for <b>all sessions</b>.",
 solution:"SELECT session_date, duration_sec, LAG(duration_sec,1) OVER(ORDER BY session_date) AS prev_duration FROM sessions;",orderMatters:false},

// ── CASE ──
{topic:"Conditional Logic",title:"CASE WHEN Expression",diff:"medium",schema:"company",
 interviewTip:"CASE is SQL's if-else. Used in SELECT columns, inside aggregates, and in ORDER BY. Very frequently tested.",
 concept:"CASE WHEN condition THEN result ... ELSE default END evaluates conditions top-down and returns the first match.",
 example:{query:"SELECT name, salary, CASE WHEN salary>70000 THEN 'Senior' ELSE 'Junior' END AS level FROM employees LIMIT 4;",note:"Labels each employee Senior or Junior."},
 task:"Return <code>name</code>, <code>salary</code>, and <code>band</code>: <code>'High'</code> if salary > 70000, <code>'Mid'</code> if > 50000, otherwise <code>'Low'</code>.",
 solution:"SELECT name, salary, CASE WHEN salary>70000 THEN 'High' WHEN salary>50000 THEN 'Mid' ELSE 'Low' END AS band FROM employees;",orderMatters:false},

{topic:"Conditional Logic",title:"CASE Inside COUNT",diff:"hard",schema:"company",
 interviewTip:"COUNT(CASE WHEN ... THEN 1 END) is a powerful pivot technique — counts rows that match a condition per group.",
 concept:"Wrapping CASE inside COUNT lets you count only rows matching a condition without a separate subquery.",
 example:{query:"SELECT department, COUNT(CASE WHEN salary>70000 THEN 1 END) AS senior_count FROM employees GROUP BY department;",note:"High earners per department in one pass."},
 task:"Return <code>department</code>, <code>COUNT(*) AS total</code>, and <code>COUNT(CASE WHEN status='active' THEN 1 END) AS active_count</code> grouped by department.",
 solution:"SELECT department, COUNT(*) AS total, COUNT(CASE WHEN status='active' THEN 1 END) AS active_count FROM employees GROUP BY department;",orderMatters:false},

// ── CTE ──
{topic:"CTEs",title:"WITH — Common Table Expression",diff:"hard",schema:"company",
 interviewTip:"CTEs make complex queries readable. Interviewers love seeing WITH over nested subqueries — it shows experience.",
 concept:"WITH cte_name AS (SELECT ...) defines a temporary named result you can reference in the main query.",
 example:{query:"WITH dept_avg AS (SELECT department, AVG(salary) AS avg_sal FROM employees GROUP BY department) SELECT * FROM dept_avg ORDER BY avg_sal DESC;",note:"CTE holds dept averages, main query reads from it."},
 task:"Write a CTE <code>high_dept</code> that selects department and avg_salary from employees grouped by department. Then SELECT * FROM high_dept WHERE avg_salary > 60000.",
 solution:"WITH high_dept AS (SELECT department, AVG(salary) AS avg_salary FROM employees GROUP BY department) SELECT * FROM high_dept WHERE avg_salary > 60000;",orderMatters:false},

{topic:"CTEs",title:"CTE + JOIN",diff:"job",schema:"shop",
 interviewTip:"Combining a CTE with a JOIN is a polished interview answer for multi-step problems.",
 concept:"A CTE can be joined to another table just like a regular table, keeping complex logic modular.",
 example:{query:"WITH ord_count AS (SELECT customer_id, COUNT(*) AS n FROM orders GROUP BY customer_id) SELECT c.name, o.n FROM customers c JOIN ord_count o ON c.id=o.customer_id;",note:"Customer names with their order count via CTE."},
 task:"Write CTE <code>spend</code>: customer_id and SUM(quantity*price) AS total from orders+products. Then JOIN spend with customers to return <code>c.name</code> and <code>total</code>.",
 solution:"WITH spend AS (SELECT o.customer_id, SUM(o.quantity*p.price) AS total FROM orders o JOIN products p ON o.product_id=p.id GROUP BY o.customer_id) SELECT c.name, s.total FROM customers c JOIN spend s ON c.id=s.customer_id;",orderMatters:false},

// ── UNION ──
{topic:"UNION",title:"UNION — Remove Duplicates",diff:"hard",schema:"shop",
 interviewTip:"UNION removes duplicates; UNION ALL keeps them and is faster. Always ask if duplicates are expected.",
 concept:"UNION stacks two SELECT results, removing duplicate rows. Both SELECTs must have the same number of columns and compatible types.",
 example:{query:"SELECT city FROM customers WHERE tier='gold' UNION SELECT city FROM customers WHERE tier='silver';",note:"Distinct cities with gold or silver customers."},
 task:"Return one combined list of <code>supplier</code> names from products with category <code>'Electronics'</code> UNION suppliers from products with <code>price > 2000</code>.",
 solution:"SELECT supplier FROM products WHERE category='Electronics' UNION SELECT supplier FROM products WHERE price>2000;",orderMatters:false},

// ── TRANSACTIONS ──
{topic:"Transactions",title:"BEGIN / COMMIT",diff:"hard",schema:"emp2",
 interviewTip:"Transactions ensure atomicity — either all changes succeed or none do. Essential for financial systems.",
 concept:"BEGIN starts a transaction. COMMIT saves all changes. If anything fails in between, ROLLBACK undoes everything.",
 example:{query:"BEGIN; UPDATE emp SET salary=salary+5000 WHERE dept='HR'; SELECT name,salary FROM emp WHERE dept='HR'; COMMIT;",note:"HR pay raise as an atomic transaction."},
 task:"Run BEGIN; UPDATE emp SET salary=salary+3000 WHERE dept='Sales'; COMMIT; Then <code>SELECT name,salary FROM emp WHERE dept='Sales';</code>",
 solution:"BEGIN; UPDATE emp SET salary=salary+3000 WHERE dept='Sales'; COMMIT; SELECT name,salary FROM emp WHERE dept='Sales';",orderMatters:false},

// ── VIEWS ──
{topic:"Views",title:"Create and Query a View",diff:"hard",schema:"company",
 interviewTip:"Views abstract complexity. In interviews, mention that views don't store data — they re-run the query each time (unlike materialized views).",
 concept:"A VIEW is a named saved query. SELECT from it like a table. Useful for hiding complexity and controlling access.",
 example:{query:"CREATE VIEW IF NOT EXISTS eng_team AS SELECT name,salary FROM employees WHERE department='Engineering'; SELECT * FROM eng_team ORDER BY salary DESC;",note:"Creates a view for the engineering team, then queries it."},
 task:"Create view <code>active_employees</code> as employees WHERE status='active'. Then <code>SELECT name, department FROM active_employees ORDER BY department;</code>",
 solution:"CREATE VIEW IF NOT EXISTS active_employees AS SELECT name, department, salary FROM employees WHERE status='active'; SELECT name, department FROM active_employees ORDER BY department;",orderMatters:true},

// ── INDEXES ──
{topic:"Indexes",title:"CREATE INDEX",diff:"medium",schema:"company",
 interviewTip:"Indexes speed up reads but slow down writes. Always mention this trade-off when asked about query optimization.",
 concept:"An index on a column allows the database to find matching rows without scanning every row (like a book index).",
 example:{query:"CREATE INDEX IF NOT EXISTS idx_dept ON employees(department); SELECT * FROM employees WHERE department='Engineering';",note:"Index on department, then fast filter."},
 task:"Create index <code>idx_salary</code> on <code>employees(salary)</code>. Then return <code>name, salary</code> where salary > 80000.",
 solution:"CREATE INDEX IF NOT EXISTS idx_salary ON employees(salary); SELECT name, salary FROM employees WHERE salary > 80000;",orderMatters:false},

// ── JOB-LEVEL ──
{topic:"Job-Level Challenges",title:"Second Highest Salary",diff:"job",schema:"company",
 interviewTip:"'Find the 2nd highest salary' is one of the most common interview questions. Know multiple approaches: subquery, OFFSET, window function.",
 concept:"Use a subquery with MAX to exclude the highest, or use OFFSET 1 after ordering.",
 example:{query:"SELECT MAX(salary) AS second_highest FROM employees WHERE salary < (SELECT MAX(salary) FROM employees);",note:"Max salary excluding the overall maximum = 2nd highest."},
 task:"Return <code>second_highest_salary</code> — the 2nd highest distinct salary in <code>employees</code> using a subquery.",
 solution:"SELECT MAX(salary) AS second_highest_salary FROM employees WHERE salary < (SELECT MAX(salary) FROM employees);",orderMatters:false},

{topic:"Job-Level Challenges",title:"Duplicate Detection",diff:"job",schema:"company",
 interviewTip:"'Find duplicate records' appears in almost every data engineering interview. GROUP BY + HAVING COUNT > 1 is the standard approach.",
 concept:"GROUP BY a column + HAVING COUNT(*) > 1 finds values that appear more than once.",
 example:{query:"SELECT department, COUNT(*) AS cnt FROM employees GROUP BY department HAVING COUNT(*) > 1;",note:"Departments that appear for more than one employee."},
 task:"Return <code>name</code> values that appear <b>more than once</b> in <code>employees</code>, with their <code>count</code>.",
 solution:"SELECT name, COUNT(*) AS count FROM employees GROUP BY name HAVING COUNT(*) > 1;",orderMatters:false},

{topic:"Job-Level Challenges",title:"Revenue Per Customer",diff:"job",schema:"shop",
 interviewTip:"Multi-join + GROUP BY + HAVING + ORDER BY in one query. This pattern appears in every data analyst take-home test.",
 concept:"Real analytics queries join multiple tables, aggregate, filter groups, and sort — all in one statement.",
 example:{query:"SELECT c.city, SUM(o.quantity*p.price) AS rev FROM orders o JOIN customers c ON o.customer_id=c.id JOIN products p ON o.product_id=p.id GROUP BY c.city ORDER BY rev DESC;",note:"Revenue per city."},
 task:"Return <code>c.name AS customer</code> and <code>total_spent</code> = SUM(quantity*price) for customers with total_spent <b>above 3000</b>, sorted descending.",
 solution:"SELECT c.name AS customer, SUM(o.quantity*p.price) AS total_spent FROM orders o JOIN customers c ON o.customer_id=c.id JOIN products p ON o.product_id=p.id GROUP BY c.name HAVING SUM(o.quantity*p.price)>3000 ORDER BY total_spent DESC;",orderMatters:true},

{topic:"Job-Level Challenges",title:"Top Product Per Category",diff:"job",schema:"shop",
 interviewTip:"'Top N per group' is the hardest common SQL interview question. Window functions (ROW_NUMBER + CTE) is the cleanest solution.",
 concept:"Use ROW_NUMBER() OVER(PARTITION BY category ORDER BY price DESC) inside a CTE, then filter WHERE rank=1.",
 example:{query:"WITH ranked AS (SELECT name, category, price, ROW_NUMBER() OVER(PARTITION BY category ORDER BY price DESC) AS rn FROM products) SELECT name, category, price FROM ranked WHERE rn=1;",note:"Most expensive product in each category."},
 task:"Return <code>name</code>, <code>category</code>, <code>stock</code> of the product with <b>highest stock</b> in each category using ROW_NUMBER() CTE.",
 solution:"WITH ranked AS (SELECT name, category, stock, ROW_NUMBER() OVER(PARTITION BY category ORDER BY stock DESC) AS rn FROM products) SELECT name, category, stock FROM ranked WHERE rn=1;",orderMatters:false},

{topic:"Job-Level Challenges",title:"Session Engagement Analysis",diff:"job",schema:"analytics",
 interviewTip:"Real product analytics queries: sessions per user, avg duration, device split. This tests joining, grouping, and aggregation together.",
 concept:"Complex aggregation across multiple columns — total sessions, avg time, and a conditional count in one GROUP BY query.",
 example:{query:"SELECT u.name, COUNT(s.id) AS sessions, AVG(s.duration_sec) AS avg_sec FROM sessions s JOIN users u ON s.user_id=u.id GROUP BY u.name;",note:"Sessions and average duration per user."},
 task:"Return <code>u.name</code>, <code>total_sessions</code> = COUNT(s.id), <code>avg_duration</code> = AVG(duration_sec), and <code>mobile_sessions</code> = COUNT(CASE WHEN s.device='mobile' THEN 1 END), joining sessions and users, grouped by user.",
 solution:"SELECT u.name, COUNT(s.id) AS total_sessions, AVG(s.duration_sec) AS avg_duration, COUNT(CASE WHEN s.device='mobile' THEN 1 END) AS mobile_sessions FROM sessions s JOIN users u ON s.user_id=u.id GROUP BY u.name;",orderMatters:false}
];

let SQL=null, currentLevel=0;
let completed=JSON.parse(localStorage.getItem('qf_c')||'[]');
let scores=JSON.parse(localStorage.getItem('qf_s')||'{}');
let hintUsed={}, revealUsed={}, exampleUsed={};

function totalScore(){return Object.values(scores).reduce((a,b)=>a+b,0);}
function count10(){return Object.values(scores).filter(v=>v===10).length;}
function count7(){return Object.values(scores).filter(v=>v===7).length;}
function count5(){return Object.values(scores).filter(v=>v===5).length;}
function count2(){return Object.values(scores).filter(v=>v===2).length;}
function save(){localStorage.setItem('qf_c',JSON.stringify(completed));localStorage.setItem('qf_s',JSON.stringify(scores));}

async function boot(){
  SQL=await initSqlJs({locateFile:f=>`https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${f}`});
  buildSidebar(); buildRail(); renderLevel(0);
  document.addEventListener('keydown',e=>{
    const tag=document.activeElement.tagName;
    if(tag==='TEXTAREA'||tag==='INPUT') return;
    if(e.key==='ArrowRight'&&currentLevel<LEVELS.length-1) renderLevel(currentLevel+1);
    if(e.key==='ArrowLeft'&&currentLevel>0) renderLevel(currentLevel-1);
  });
}

function freshDb(key){const db=new SQL.Database();db.run(SCHEMAS[key].setup);return db;}

function buildSidebar(){
  const topics=[...new Set(LEVELS.map(l=>l.topic))];
  const tl=document.getElementById('topicList'); tl.innerHTML='';
  topics.forEach(topic=>{
    const indices=LEVELS.map((l,i)=>l.topic===topic?i:-1).filter(i=>i>=0);
    const allDone=indices.every(i=>completed.includes(i));
    const isCur=indices.includes(currentLevel);
    const b=document.createElement('button');
    b.className='topic-btn'+(allDone?' done-topic':'')+(isCur?' active':'');
    b.innerHTML=`<span class="dot"></span>${topic} <span style="margin-left:auto;opacity:.5;font-size:9px">${indices.filter(i=>completed.includes(i)).length}/${indices.length}</span>`;
    b.onclick=()=>renderLevel(indices[0]);
    tl.appendChild(b);
  });
}

function buildRail(){
  const rail=document.getElementById('rail'); rail.innerHTML='';
  LEVELS.forEach((lvl,i)=>{
    const b=document.createElement('button');
    b.textContent=i+1; b.title=`${lvl.topic}: ${lvl.title}`;
    if(completed.includes(i))b.classList.add('done');
    if(i===currentLevel)b.classList.add('active');
    b.onclick=()=>renderLevel(i);
    rail.appendChild(b);
  });
  document.getElementById('totalScore').textContent=totalScore();
  document.getElementById('s10').textContent=count10();
  document.getElementById('s7').textContent=count7();
  document.getElementById('s5').textContent=count5();
  document.getElementById('s2').textContent=count2();
}

function runQ(db,sql){try{return{ok:true,res:db.exec(sql)};}catch(e){return{ok:false,error:e.message};}}
function toRows(res){if(!res||!res.length)return{columns:[],values:[]};return{columns:res[0].columns,values:res[0].values};}
function norm(r,ord){let v=r.values.map(row=>row.map(c=>c===null?'NULL':String(c)));if(!ord)v=v.map(x=>x.join('|')).sort();else v=v.map(x=>x.join('|'));return JSON.stringify(v);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function tbl(r){
  if(!r.columns.length)return'<div style="padding:10px;color:var(--text-dim);font-size:11px;">No rows returned.</div>';
  let h='<div class="resultset"><table class="rs"><thead><tr>';
  r.columns.forEach(c=>h+=`<th>${esc(c)}</th>`);
  h+='</tr></thead><tbody>';
  r.values.forEach(row=>{h+='<tr>'+row.map(v=>`<td>${v===null?'<i style="color:var(--text-dim)">NULL</i>':esc(String(v))}</td>`).join('')+'</tr>';});
  return h+`</tbody></table></div><div class="row-count">${r.values.length} row${r.values.length!==1?'s':''} returned</div>`;
}

function renderLevel(idx){
  currentLevel=idx;
  const lvl=LEVELS[idx];
  const skey=lvl.schema;
  const schema=SCHEMAS[skey];
  const exDb=freshDb(skey);
  const exRes=runQ(exDb,lvl.example.query);
  const exRows=exRes.ok?toRows(exRes.res):{columns:[],values:[]};
  const app=document.getElementById('app');
  app.className='';
  app.innerHTML=`
<div class="card">
  <div class="topic-label">${esc(lvl.topic)}</div>
  <h2>Question ${idx+1} of ${LEVELS.length}</h2>
  <div class="lvl-title">${esc(lvl.title)}<span class="diff ${lvl.diff}">${lvl.diff}</span></div>

  <div class="itip"><div class="itip-label">🎯 Interview Tip</div>${lvl.interviewTip}</div>

  <div class="task">${lvl.task}</div>

  <button class="example-reveal-btn" id="exRevealBtn">
    👁 See Example <span class="warn-tag">(costs 3 pts if you haven't solved it yet)</span>
  </button>
  <div class="example" id="exampleBlock">
    <div class="label">⚠ Example Shown — Concept &amp; Example</div>
    <div class="ex-desc" style="margin-bottom:6px;">${lvl.concept}</div>
    <pre>${esc(lvl.example.query)}</pre>
    ${tbl(exRows)}
    <div class="ex-desc" style="margin-top:5px;">${lvl.example.note}</div>
  </div>

  <span class="schema-toggle" id="schemaToggle">▸ view table schema</span>
  <div class="schema-box" id="schemaBox">
    <div class="tbl-grid">
      ${schema.tables.map(t=>`<div class="tbl"><div class="tname">${t.name}</div>${t.cols.map(c=>{const[n,...r]=c.split(' ');return`<div class="col"><b>${n}</b> ${r.join(' ')}</div>`;}).join('')}</div>`).join('')}
    </div>
  </div>

  <div class="editor-wrap">
    <textarea id="sqlInput" spellcheck="false" placeholder="Write your SQL here… (Ctrl+Enter to run)"></textarea>
  </div>
  <div class="btn-row">
    <button class="run" id="runBtn">▶ Run &amp; Check</button>
    <button class="hint" id="hintBtn">💡 Hint (−5 pts)</button>
    <button class="reveal" id="revealBtn">🔓 Reveal Answer (−8 pts)</button>
  </div>
  <div class="hint-box" id="hintBox"></div>
  <div class="result-area">
    <div class="feedback" id="feedback"></div>
    <div id="resultTable"></div>
    <div class="solution-box" id="solutionBox"><div class="label">Correct Solution</div><pre id="solutionText"></pre></div>
  </div>
  <div class="next-row" id="nextRow">
    <button class="nextlvl" id="nextBtn">Next →</button>
    <div class="nav-arrows">
      <button onclick="renderLevel(Math.max(0,currentLevel-1))">← Prev</button>
      <button onclick="renderLevel(Math.min(LEVELS.length-1,currentLevel+1))">Next →</button>
    </div>
  </div>
</div>`;

  document.getElementById('exRevealBtn').onclick=()=>{
    exampleUsed[idx]=true;
    document.getElementById('exampleBlock').classList.add('visible');
    document.getElementById('exRevealBtn').style.display='none';
  };
  document.getElementById('schemaToggle').onclick=e=>{
    const b=document.getElementById('schemaBox'); b.classList.toggle('open');
    e.target.textContent=b.classList.contains('open')?'▾ hide schema':'▸ view table schema';
  };
  document.getElementById('hintBtn').onclick=()=>{
    hintUsed[idx]=true;
    const kw=lvl.solution.match(/\b(SELECT|WHERE|GROUP BY|ORDER BY|JOIN|HAVING|LIKE|IN|BETWEEN|CASE|DISTINCT|LIMIT|INSERT|UPDATE|DELETE|ALTER|CREATE|UNION|TRIGGER|VIEW|BEGIN|COMMIT|EXISTS|NOT EXISTS|ROW_NUMBER|RANK|LAG|LEAD|OVER|PARTITION BY|WITH|OFFSET|AUTOINCREMENT)\b/gi)||[];
    const hb=document.getElementById('hintBox');
    hb.textContent='Keywords to use: '+[...new Set(kw.map(k=>k.toUpperCase()))].join(', ')+'.';
    hb.classList.add('show');
  };
  document.getElementById('revealBtn').onclick=()=>{
    revealUsed[idx]=true;
    document.getElementById('solutionText').textContent=lvl.solution;
    document.getElementById('solutionBox').classList.add('show');
  };
  document.getElementById('runBtn').onclick=()=>checkAnswer(idx);
  document.getElementById('sqlInput').addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='Enter')checkAnswer(idx);});
  document.getElementById('nextBtn').onclick=()=>{if(idx+1<LEVELS.length)renderLevel(idx+1);};
  buildRail(); buildSidebar();
}

function checkAnswer(idx){
  const lvl=LEVELS[idx];
  const skey=lvl.schema;
  const userSql=document.getElementById('sqlInput').value.trim();
  const fb=document.getElementById('feedback');
  const rd=document.getElementById('resultTable');
  fb.className='feedback show'; rd.innerHTML='';
  if(!userSql){fb.classList.add('err');fb.textContent='Write a query first.';return;}
  const uDb=freshDb(skey);
  const uRes=runQ(uDb,userSql);
  if(!uRes.ok){
    fb.classList.remove('ok','err');fb.classList.add('bad');
    fb.textContent='✕ SQL error: '+uRes.error;
    return;
  }
  const uRows=toRows(uRes.res);
  rd.innerHTML='<div style="font-size:10px;color:var(--text-dim);margin-bottom:5px;">Your result:</div>'+tbl(uRows);
  const rDb=freshDb(skey);
  const rRes=runQ(rDb,lvl.solution);
  const rRows=toRows(rRes.res);
  const same=norm(uRows,lvl.orderMatters)===norm(rRows,lvl.orderMatters);
  if(same){
    fb.classList.remove('bad','err'); fb.classList.add('ok');
    const alreadyDone=completed.includes(idx);
    let pts=revealUsed[idx]?2:hintUsed[idx]?5:exampleUsed[idx]?7:10;
    const isClean=pts===10;
    if(!alreadyDone){completed.push(idx);scores[idx]=pts;save();}
    const badge=pts===10?'🏆 +10 (clean!)':pts===7?'👁 +7 (example used)':pts===5?'💡 +5 (hint used)':'📖 +2 (revealed)';
    fb.textContent=`✓ Correct! ${alreadyDone?'(already scored)':badge}`;
    document.getElementById('nextRow').classList.add('show');
    if(isClean && !alreadyDone) celebrate();
    buildRail(); buildSidebar();
  } else {
    fb.classList.remove('ok','err'); fb.classList.add('bad');
    fb.textContent=lvl.orderMatters?'✕ Not quite — check columns, filter, or row order.':'✕ Not quite — check columns and filter conditions.';
  }
}

function celebrate(){
  const cel=document.getElementById('celebration');
  cel.style.display='block';
  cel.innerHTML='';
  const colors=['#5ee6c8','#ffd166','#6ee787','#ff9b6a','#a29bfe','#fd79a8'];
  for(let i=0;i<60;i++){
    const p=document.createElement('div');
    p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}%;top:-10px;background:${colors[i%colors.length]};animation-duration:${0.8+Math.random()*1.2}s;animation-delay:${Math.random()*0.4}s;transform:rotate(${Math.random()*360}deg);`;
    cel.appendChild(p);
  }
  const popup=document.createElement('div');
  popup.className='trophy-popup';
  popup.innerHTML='<span class="icon">🏆</span><div class="msg">Perfect Score!</div><div class="sub">No hints, no example needed</div>';
  document.body.appendChild(popup);
  setTimeout(()=>{cel.style.display='none';cel.innerHTML='';popup.remove();},2200);
}

document.getElementById('randomBtn').onclick=()=>renderLevel(Math.floor(Math.random()*LEVELS.length));
boot();
</script>
</body>
