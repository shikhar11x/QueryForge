<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QueryForge — SQL Practice</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
<style>
:root{--bg:#0c1118;--panel:#121927;--panel-2:#161f30;--line:#243047;--text:#dce6f5;--text-dim:#8294b3;--accent:#5ee6c8;--accent-dim:#2e7d6c;--warn:#ff9b6a;--bad:#ff6b7a;--good:#6ee787;--gold:#ffd166;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--text);font-family:'IBM Plex Mono','Courier New',monospace;min-height:100vh;}
::selection{background:var(--accent-dim);color:#fff;}
.layout{display:flex;min-height:100vh;}
/* SIDEBAR */
.sidebar{width:230px;min-width:230px;background:#090d14;border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;}
.sb-header{padding:14px 12px 10px;border-bottom:1px solid var(--line);}
.sb-header .logo{color:var(--accent);font-weight:700;font-size:15px;}
.sb-header small{color:var(--text-dim);font-size:10px;display:block;margin-top:2px;}
.sb-random{margin:8px;padding:8px;background:rgba(94,230,200,.08);border:1px solid var(--accent-dim);border-radius:7px;color:var(--accent);font-size:11px;cursor:pointer;font-family:inherit;text-align:center;font-weight:700;}
.sb-random:hover{background:rgba(94,230,200,.18);}
.topic-btn{width:100%;background:none;border:none;border-bottom:1px solid var(--line);text-align:left;padding:9px 12px;font-size:11px;color:var(--text-dim);cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;transition:all .15s;}
.topic-btn:hover{color:var(--text);background:rgba(255,255,255,.03);}
.topic-btn.active{color:var(--accent);background:rgba(94,230,200,.07);}
.topic-btn .dot{width:6px;height:6px;border-radius:50%;background:var(--line);flex-shrink:0;transition:background .2s;}
.topic-btn.done-topic .dot{background:var(--good);}
.topic-btn.active .dot{background:var(--accent);}
/* MAIN */
.main{flex:1;min-width:0;padding:22px 20px 80px;}
.topbar{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.brand .mark{color:var(--accent);font-weight:700;font-size:18px;}
.brand .tag{color:var(--text-dim);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;}
.score-pill{font-size:12px;color:var(--gold);border:1px solid rgba(255,209,102,.3);padding:5px 12px;border-radius:20px;background:rgba(255,209,102,.06);}
.score-pill b{font-size:15px;}
.score-bar{display:flex;gap:14px;margin-bottom:14px;font-size:11px;flex-wrap:wrap;}
.sc-item{display:flex;align-items:center;gap:5px;color:var(--text-dim);}
.sc-item .sv{font-weight:700;font-size:14px;}
.sc-item.gold .sv{color:var(--gold);}
.sc-item.green .sv{color:var(--good);}
.sc-item.red .sv{color:var(--bad);}
/* RAIL */
.rail{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:16px;}
.rail button{width:28px;height:28px;border-radius:5px;border:1px solid var(--line);background:var(--panel);color:var(--text-dim);font-family:inherit;font-size:10px;cursor:pointer;transition:all .12s;}
.rail button:hover{border-color:var(--accent-dim);color:var(--text);}
.rail button.active{background:var(--accent);color:#06140f;border-color:var(--accent);font-weight:700;}
.rail button.done{color:var(--good);border-color:var(--good);}
.rail button.done.active{background:var(--good);color:#06140f;}
/* CARD */
.card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:18px 20px;margin-bottom:12px;}
.topic-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);margin-bottom:4px;font-weight:600;}
.card h2{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);font-weight:600;margin-bottom:3px;}
.lvl-title{font-size:17px;font-weight:700;color:var(--text);margin:2px 0 10px;letter-spacing:-.3px;}
.diff{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;margin-left:8px;letter-spacing:.5px;}
.diff.easy{background:rgba(110,231,135,.12);color:var(--good);}
.diff.medium{background:rgba(255,155,106,.12);color:var(--warn);}
.diff.hard{background:rgba(255,107,122,.12);color:var(--bad);}
.diff.job{background:rgba(94,230,200,.15);color:var(--accent);}
.task{color:var(--text);line-height:1.65;font-size:13.5px;margin-bottom:12px;}
.task code{background:var(--panel-2);padding:1px 5px;border-radius:4px;color:var(--accent);font-size:12px;}
.example{border-left:3px solid var(--accent-dim);background:var(--panel-2);border-radius:0 8px 8px 0;padding:11px 13px;margin-bottom:12px;}
.example .label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);margin-bottom:5px;font-weight:600;}
.example pre{margin:0 0 7px;font-size:12px;color:var(--text);white-space:pre-wrap;}
.example .ex-desc{font-size:11.5px;color:var(--text-dim);}
.schema-toggle{cursor:pointer;font-size:11px;color:var(--text-dim);text-decoration:underline;text-underline-offset:3px;margin-bottom:10px;display:inline-block;}
.schema-box{display:none;margin-bottom:10px;}
.schema-box.open{display:block;}
.tbl-grid{display:flex;gap:10px;flex-wrap:wrap;}
.tbl{background:var(--panel-2);border:1px solid var(--line);border-radius:7px;padding:8px 11px;min-width:140px;}
.tbl .tname{color:var(--accent);font-weight:700;font-size:11px;margin-bottom:4px;}
.tbl .col{font-size:10px;color:var(--text-dim);}
.tbl .col b{color:var(--text);font-weight:500;}
textarea#sqlInput{width:100%;min-height:85px;background:#070b12;border:1px solid var(--line);border-radius:8px;color:var(--accent);font-family:inherit;font-size:13.5px;padding:11px 13px;resize:vertical;line-height:1.6;outline:none;}
textarea#sqlInput:focus{border-color:var(--accent-dim);}
.btn-row{display:flex;gap:7px;margin-top:9px;flex-wrap:wrap;align-items:center;}
button.run,button.hint,button.reveal{font-family:inherit;font-size:12px;border-radius:6px;padding:8px 14px;cursor:pointer;border:1px solid transparent;transition:all .15s;}
button.run{background:var(--accent);color:#06140f;font-weight:700;border-color:var(--accent);}
button.run:hover{background:#7af0d6;}
button.hint{background:transparent;border-color:var(--line);color:var(--text-dim);}
button.hint:hover{color:var(--text);border-color:var(--text-dim);}
button.reveal{background:transparent;border-color:var(--bad);color:var(--bad);}
button.reveal:hover{background:rgba(255,107,122,.1);}
.hint-box{margin-top:9px;font-size:12px;color:var(--warn);background:rgba(255,155,106,.08);border:1px solid rgba(255,155,106,.25);padding:8px 11px;border-radius:6px;display:none;}
.hint-box.show{display:block;}
.result-area{margin-top:12px;}
.feedback{padding:9px 13px;border-radius:7px;font-size:12.5px;margin-bottom:10px;display:none;align-items:center;gap:8px;}
.feedback.show{display:flex;}
.feedback.ok{background:rgba(110,231,135,.1);border:1px solid rgba(110,231,135,.35);color:var(--good);}
.feedback.bad{background:rgba(255,107,122,.1);border:1px solid rgba(255,107,122,.35);color:var(--bad);}
.feedback.err{background:rgba(255,155,106,.1);border:1px solid rgba(255,155,106,.35);color:var(--warn);}
.resultset{overflow-x:auto;border:1px solid var(--line);border-radius:7px;}
table.rs{border-collapse:collapse;width:100%;font-size:12px;}
table.rs th{background:var(--panel-2);color:var(--accent);text-align:left;padding:6px 10px;border-bottom:1px solid var(--line);white-space:nowrap;}
table.rs td{padding:5px 10px;border-bottom:1px solid var(--line);color:var(--text);white-space:nowrap;}
table.rs tr:last-child td{border-bottom:none;}
.solution-box{margin-top:10px;background:#1a0f12;border:1px solid rgba(255,107,122,.3);border-radius:7px;padding:9px 12px;display:none;}
.solution-box.show{display:block;}
.solution-box .label{font-size:10px;text-transform:uppercase;color:var(--bad);letter-spacing:1.5px;margin-bottom:5px;font-weight:600;}
.solution-box pre{margin:0;color:var(--text);font-size:12px;white-space:pre-wrap;}
.next-row{margin-top:12px;display:none;}
.next-row.show{display:block;}
button.nextlvl{background:var(--accent);color:#06140f;font-weight:700;border:none;border-radius:6px;padding:9px 18px;font-family:inherit;font-size:12px;cursor:pointer;}
button.nextlvl:hover{background:#7af0d6;}
.loading{color:var(--text-dim);font-size:13px;padding:40px 0;text-align:center;}
footer{margin-top:24px;text-align:center;color:var(--text-dim);font-size:10px;}
@media(max-width:650px){.layout{flex-direction:column;}.sidebar{width:100%;height:auto;position:relative;border-right:none;border-bottom:1px solid var(--line);}.main{padding:12px 10px 60px;}}
</style>
</head>
<body>
<div class="layout">
<div class="sidebar">
  <div class="sb-header"><div class="logo">QueryForge</div><small>SQL Practice · Real Engine</small></div>
  <button class="sb-random" id="randomBtn">⚡ Random Question</button>
  <div id="topicList"></div>
</div>
<div class="main">
  <div class="topbar">
    <div class="brand"><div class="mark">QueryForge</div><div class="tag">SQLite · Browser</div></div>
    <div class="score-pill">Score: <b id="totalScore">0</b></div>
  </div>
  <div class="score-bar">
    <div class="sc-item gold"><span class="sv" id="s10">0</span> No-hint ×10</div>
    <div class="sc-item green"><span class="sv" id="s5">0</span> Hint ×5</div>
    <div class="sc-item red"><span class="sv" id="s2">0</span> Revealed ×2</div>
  </div>
  <div class="rail" id="rail"></div>
  <div id="app" class="loading">Booting SQLite engine…</div>
  <footer>Runs entirely in your browser. Nothing is sent anywhere.</footer>
</div>
</div>
<script>
const SCHEMA_COMPANY=`
CREATE TABLE departments(id INTEGER PRIMARY KEY,name TEXT,budget INTEGER);
INSERT INTO departments VALUES(1,'Engineering',900000),(2,'Sales',400000),(3,'Marketing',250000),(4,'HR',150000);
CREATE TABLE employees(id INTEGER PRIMARY KEY,name TEXT,department TEXT,salary INTEGER,hire_date TEXT,manager_id INTEGER);
INSERT INTO employees VALUES(1,'Asha Rao','Engineering',95000,'2019-03-12',NULL),(2,'Vikram Shah','Engineering',82000,'2020-07-01',1),(3,'Meera Iyer','Engineering',78000,'2021-01-15',1),(4,'Rahul Nair','Sales',61000,'2018-11-20',NULL),(5,'Priya Menon','Sales',58000,'2022-04-09',4),(6,'Karan Joshi','Sales',54000,'2023-02-18',4),(7,'Divya Pillai','Marketing',49000,'2021-09-30',NULL),(8,'Arjun Kapoor','Marketing',47000,'2022-12-01',7),(9,'Sneha Reddy','HR',52000,'2020-06-25',NULL),(10,'Nikhil Verma','HR',45000,'2023-08-14',9),(11,'Ishita Sen','Engineering',88000,'2019-10-05',1),(12,'Farhan Ali','Sales',63000,'2017-05-22',4);
`;
const SCHEMA_SHOP=`
CREATE TABLE customers(id INTEGER PRIMARY KEY,name TEXT,city TEXT,signup_date TEXT);
INSERT INTO customers VALUES(1,'Ananya Gupta','Mumbai','2022-01-10'),(2,'Rohan Das','Delhi','2022-03-22'),(3,'Kavya Pillai','Bengaluru','2021-11-02'),(4,'Sahil Khan','Pune','2023-02-14'),(5,'Tanvi Joshi','Mumbai','2023-06-30');
CREATE TABLE products(id INTEGER PRIMARY KEY,name TEXT,category TEXT,price INTEGER,stock INTEGER);
INSERT INTO products VALUES(1,'Wireless Mouse','Electronics',799,150),(2,'Mechanical Keyboard','Electronics',3499,60),(3,'Yoga Mat','Fitness',999,200),(4,'Running Shoes','Fitness',2999,80),(5,'Coffee Mug','Home',299,300),(6,'Desk Lamp','Home',1299,90);
CREATE TABLE orders(id INTEGER PRIMARY KEY,customer_id INTEGER,product_id INTEGER,quantity INTEGER,order_date TEXT);
INSERT INTO orders VALUES(1,1,1,2,'2023-07-01'),(2,1,3,1,'2023-07-05'),(3,2,2,1,'2023-07-10'),(4,3,4,2,'2023-08-01'),(5,3,5,3,'2023-08-02'),(6,4,6,1,'2023-08-15'),(7,5,1,1,'2023-09-01'),(8,2,5,2,'2023-09-05'),(9,1,2,1,'2023-09-20');
`;
const SCHEMA_EMP2=`
CREATE TABLE emp(id INTEGER PRIMARY KEY,name TEXT,dept TEXT,salary INTEGER,hire_date TEXT,manager_id INTEGER);
INSERT INTO emp VALUES(1,'Alice','Eng',90000,'2018-01-01',NULL),(2,'Bob','Eng',75000,'2019-05-10',1),(3,'Carol','HR',55000,'2020-03-15',NULL),(4,'Dave','Sales',60000,'2019-07-20',NULL),(5,'Eve','Sales',58000,'2021-01-05',4),(6,'Frank','Eng',82000,'2017-11-11',1),(7,'Grace','HR',48000,'2022-06-01',3),(8,'Heidi','Sales',65000,'2016-09-09',4);
`;
const SCHEMA_STORE=`
CREATE TABLE items(id INTEGER PRIMARY KEY,name TEXT,category TEXT,price INTEGER,stock INTEGER);
INSERT INTO items VALUES(1,'Laptop','Electronics',45000,20),(2,'Phone','Electronics',15000,50),(3,'Desk','Furniture',8000,30),(4,'Chair','Furniture',3500,60),(5,'Notebook','Stationery',120,500),(6,'Pen','Stationery',30,1000);
CREATE TABLE sales(id INTEGER PRIMARY KEY,item_id INTEGER,qty INTEGER,sale_date TEXT,customer TEXT);
INSERT INTO sales VALUES(1,1,2,'2024-01-10','Raj'),(2,2,5,'2024-01-12','Priya'),(3,3,1,'2024-01-15','Raj'),(4,4,3,'2024-01-20','Sam'),(5,1,1,'2024-02-01','Priya'),(6,2,2,'2024-02-05','Sam'),(7,5,10,'2024-02-10','Raj'),(8,6,20,'2024-02-12','Priya');
`;
const SCHEMAS={
  company:{setup:SCHEMA_COMPANY,tables:[{name:'departments',cols:['id INT','name TEXT','budget INT']},{name:'employees',cols:['id INT','name TEXT','department TEXT','salary INT','hire_date TEXT','manager_id INT']}]},
  shop:{setup:SCHEMA_SHOP,tables:[{name:'customers',cols:['id INT','name TEXT','city TEXT','signup_date TEXT']},{name:'products',cols:['id INT','name TEXT','category TEXT','price INT','stock INT']},{name:'orders',cols:['id INT','customer_id INT','product_id INT','quantity INT','order_date TEXT']}]},
  emp2:{setup:SCHEMA_EMP2,tables:[{name:'emp',cols:['id INT','name TEXT','dept TEXT','salary INT','hire_date TEXT','manager_id INT']}]},
  store:{setup:SCHEMA_STORE,tables:[{name:'items',cols:['id INT','name TEXT','category TEXT','price INT','stock INT']},{name:'sales',cols:['id INT','item_id INT','qty INT','sale_date TEXT','customer TEXT']}]}
};

const LEVELS=[
// SELECT Basics
{topic:"SELECT Basics",title:"Select All Rows",diff:"easy",schema:"company",concept:"SELECT * returns every column and every row from a table.",example:{query:"SELECT * FROM departments;",note:"Returns all 4 department rows."},task:"Return <b>all columns and all rows</b> from the <code>employees</code> table.",solution:"SELECT * FROM employees;",orderMatters:false},
{topic:"SELECT Basics",title:"Pick Specific Columns",diff:"easy",schema:"company",concept:"List only the columns you need after SELECT, comma-separated.",example:{query:"SELECT name, budget FROM departments;",note:"Only name and budget columns."},task:"Return only <code>name</code> and <code>salary</code> from <code>employees</code>.",solution:"SELECT name, salary FROM employees;",orderMatters:false},
{topic:"SELECT Basics",title:"Column Alias",diff:"easy",schema:"company",concept:"AS renames a column in the output.",example:{query:"SELECT name, budget AS dept_budget FROM departments;",note:"budget column shows as dept_budget."},task:"Return <code>name</code> aliased as <code>emp_name</code> and <code>salary</code> aliased as <code>pay</code> from <code>employees</code>.",solution:"SELECT name AS emp_name, salary AS pay FROM employees;",orderMatters:false},
// Inserting Rows
{topic:"Inserting Rows",title:"Insert a New Row",diff:"easy",schema:"emp2",concept:"INSERT INTO table (cols) VALUES (vals) adds a new row.",example:{query:"INSERT INTO emp VALUES(9,'Zara','Mkt',50000,'2024-01-01',NULL); SELECT * FROM emp WHERE id=9;",note:"Adds Zara and selects her row."},task:"Insert: id=9, name='Ivan', dept='Marketing', salary=51000, hire_date='2024-03-01', manager_id=NULL. Then <code>SELECT * FROM emp WHERE id=9;</code>",solution:"INSERT INTO emp VALUES(9,'Ivan','Marketing',51000,'2024-03-01',NULL); SELECT * FROM emp WHERE id=9;",orderMatters:false},
{topic:"Inserting Rows",title:"Insert Multiple Rows",diff:"medium",schema:"emp2",concept:"Multiple rows can be inserted in one INSERT statement.",example:{query:"INSERT INTO emp VALUES(9,'X','HR',40000,'2024-01-01',3),(10,'Y','HR',42000,'2024-01-01',3); SELECT * FROM emp WHERE dept='HR';",note:"Inserts two rows at once."},task:"Insert (9,'Leo','Sales',55000,'2024-01-15',4) and (10,'Mia','Sales',57000,'2024-02-20',4). Then <code>SELECT * FROM emp WHERE dept='Sales' ORDER BY id;</code>",solution:"INSERT INTO emp VALUES(9,'Leo','Sales',55000,'2024-01-15',4),(10,'Mia','Sales',57000,'2024-02-20',4); SELECT * FROM emp WHERE dept='Sales' ORDER BY id;",orderMatters:true},
// Updating & Deleting
{topic:"Updating & Deleting Data",title:"Update a Row",diff:"easy",schema:"emp2",concept:"UPDATE table SET col=val WHERE condition changes existing rows.",example:{query:"UPDATE emp SET salary=95000 WHERE id=1; SELECT id,name,salary FROM emp WHERE id=1;",note:"Raises Alice's salary."},task:"Update <code>emp</code>: set salary=70000 where name='Bob'. Then <code>SELECT id,name,salary FROM emp WHERE name='Bob';</code>",solution:"UPDATE emp SET salary=70000 WHERE name='Bob'; SELECT id,name,salary FROM emp WHERE name='Bob';",orderMatters:false},
{topic:"Updating & Deleting Data",title:"Delete Rows",diff:"medium",schema:"emp2",concept:"DELETE FROM table WHERE condition removes matching rows.",example:{query:"DELETE FROM emp WHERE id=7; SELECT COUNT(*) AS remaining FROM emp;",note:"Deletes one row, counts remaining."},task:"Delete from <code>emp</code> where dept='HR'. Then <code>SELECT COUNT(*) AS remaining FROM emp;</code>",solution:"DELETE FROM emp WHERE dept='HR'; SELECT COUNT(*) AS remaining FROM emp;",orderMatters:false},
// Altering Tables
{topic:"Altering and Dropping Tables",title:"Add a Column",diff:"medium",schema:"emp2",concept:"ALTER TABLE ... ADD COLUMN adds a new column to an existing table.",example:{query:"ALTER TABLE emp ADD COLUMN bonus INTEGER DEFAULT 0; SELECT name,bonus FROM emp LIMIT 2;",note:"Adds bonus column with default 0."},task:"Add column <code>is_active INTEGER DEFAULT 1</code> to <code>emp</code>. Then <code>SELECT name,is_active FROM emp LIMIT 3;</code>",solution:"ALTER TABLE emp ADD COLUMN is_active INTEGER DEFAULT 1; SELECT name,is_active FROM emp LIMIT 3;",orderMatters:false},
{topic:"Altering and Dropping Tables",title:"Rename a Column",diff:"hard",schema:"emp2",concept:"ALTER TABLE ... RENAME COLUMN old TO new renames a column.",example:{query:"ALTER TABLE emp RENAME COLUMN dept TO department; SELECT name,department FROM emp LIMIT 2;",note:"dept is now called department."},task:"Rename column <code>salary</code> to <code>pay</code> in <code>emp</code>. Then <code>SELECT name,pay FROM emp LIMIT 3;</code>",solution:"ALTER TABLE emp RENAME COLUMN salary TO pay; SELECT name,pay FROM emp LIMIT 3;",orderMatters:false},
// WHERE & Filtering
{topic:"WHERE & Filtering",title:"Filter With WHERE",diff:"easy",schema:"company",concept:"WHERE filters rows that match a condition.",example:{query:"SELECT * FROM departments WHERE name='Sales';",note:"Only the Sales row."},task:"Return all columns for employees in department <code>'Engineering'</code>.",solution:"SELECT * FROM employees WHERE department='Engineering';",orderMatters:false},
{topic:"WHERE & Filtering",title:"Comparison Operators",diff:"easy",schema:"company",concept:">, <, >=, <=, != work for numbers and dates in WHERE.",example:{query:"SELECT name,budget FROM departments WHERE budget>300000;",note:"Departments with budget above 300k."},task:"Return <code>name</code> and <code>salary</code> of employees earning <b>more than 60000</b>.",solution:"SELECT name,salary FROM employees WHERE salary>60000;",orderMatters:false},
{topic:"WHERE & Filtering",title:"BETWEEN Range",diff:"medium",schema:"company",concept:"BETWEEN a AND b checks an inclusive range.",example:{query:"SELECT name,budget FROM departments WHERE budget BETWEEN 200000 AND 500000;",note:"200k to 500k inclusive."},task:"Return <code>name</code> and <code>salary</code> of employees earning <b>between 50000 and 65000</b>.",solution:"SELECT name,salary FROM employees WHERE salary BETWEEN 50000 AND 65000;",orderMatters:false},
// ORDER BY & LIMIT
{topic:"ORDER BY and LIMIT",title:"Sort Results",diff:"easy",schema:"company",concept:"ORDER BY sorts rows. DESC = high to low, ASC = low to high (default).",example:{query:"SELECT name,budget FROM departments ORDER BY budget DESC;",note:"Highest budget first."},task:"Return <code>name</code> and <code>salary</code> of all employees sorted by salary <b>highest to lowest</b>.",solution:"SELECT name,salary FROM employees ORDER BY salary DESC;",orderMatters:true},
{topic:"ORDER BY and LIMIT",title:"Top N Results",diff:"easy",schema:"company",concept:"LIMIT caps how many rows come back.",example:{query:"SELECT name,budget FROM departments ORDER BY budget DESC LIMIT 2;",note:"Top 2 by budget."},task:"Return the <b>top 3 highest paid</b> employees: <code>name</code> and <code>salary</code>.",solution:"SELECT name,salary FROM employees ORDER BY salary DESC LIMIT 3;",orderMatters:true},
{topic:"ORDER BY and LIMIT",title:"OFFSET Pagination",diff:"medium",schema:"company",concept:"OFFSET skips rows — combine with LIMIT for pagination.",example:{query:"SELECT name,salary FROM employees ORDER BY salary DESC LIMIT 3 OFFSET 3;",note:"Rows 4-6 by salary."},task:"Return employees ranked <b>4th to 6th</b> by salary (highest first): <code>name</code> and <code>salary</code>.",solution:"SELECT name,salary FROM employees ORDER BY salary DESC LIMIT 3 OFFSET 3;",orderMatters:true},
// Functions
{topic:"Functions in SQL",title:"COUNT and AVG",diff:"medium",schema:"company",concept:"COUNT(*) counts rows. AVG(col) computes the average.",example:{query:"SELECT COUNT(*) AS total FROM employees;",note:"Total number of employees."},task:"Return the <b>average salary</b> as <code>avg_salary</code> from <code>employees</code>.",solution:"SELECT AVG(salary) AS avg_salary FROM employees;",orderMatters:false},
{topic:"Functions in SQL",title:"MIN and MAX",diff:"easy",schema:"company",concept:"MIN and MAX return the smallest and largest value in a column.",example:{query:"SELECT MIN(budget) AS min_b, MAX(budget) AS max_b FROM departments;",note:"Min and max budgets."},task:"Return <code>min_salary</code> and <code>max_salary</code> from <code>employees</code>.",solution:"SELECT MIN(salary) AS min_salary, MAX(salary) AS max_salary FROM employees;",orderMatters:false},
{topic:"Functions in SQL",title:"String — LENGTH",diff:"medium",schema:"company",concept:"LENGTH(col) returns character count. UPPER() converts to uppercase.",example:{query:"SELECT name, UPPER(name) AS upper_name FROM employees LIMIT 3;",note:"Uppercase name column."},task:"Return <code>name</code> and <code>LENGTH(name) AS name_len</code> from <code>employees</code>, sorted by name_len descending.",solution:"SELECT name, LENGTH(name) AS name_len FROM employees ORDER BY name_len DESC;",orderMatters:true},
// Logical Operators

let SQL=null,currentLevel=0;
let completed=JSON.parse(sessionStorage.getItem('qf_c')||'[]');
let scores=JSON.parse(sessionStorage.getItem('qf_s')||'{}');
let hintUsed={},revealUsed={};

function totalScore(){return Object.values(scores).reduce((a,b)=>a+b,0);}
function count10(){return Object.values(scores).filter(v=>v===10).length;}
function count5(){return Object.values(scores).filter(v=>v===5).length;}
function count2(){return Object.values(scores).filter(v=>v===2).length;}
function save(){sessionStorage.setItem('qf_c',JSON.stringify(completed));sessionStorage.setItem('qf_s',JSON.stringify(scores));}

async function boot(){
  SQL=await initSqlJs({locateFile:f=>`https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${f}`});
  buildSidebar();buildRail();renderLevel(0);
}

function freshDb(key){const db=new SQL.Database();db.run(SCHEMAS[key].setup);return db;}

function buildSidebar(){
  const topics=[...new Set(LEVELS.map(l=>l.topic))];
  const tl=document.getElementById('topicList');tl.innerHTML='';
  topics.forEach(topic=>{
    const indices=LEVELS.map((l,i)=>l.topic===topic?i:-1).filter(i=>i>=0);
    const allDone=indices.every(i=>completed.includes(i));
    const isCur=indices.includes(currentLevel);
    const b=document.createElement('button');
    b.className='topic-btn'+(allDone?' done-topic':'')+(isCur?' active':'');
    b.innerHTML=`<span class="dot"></span>${topic}`;
    b.onclick=()=>renderLevel(indices[0]);
    tl.appendChild(b);
  });
}

function buildRail(){
  const rail=document.getElementById('rail');rail.innerHTML='';
  LEVELS.forEach((lvl,i)=>{
    const b=document.createElement('button');
    b.textContent=i+1;b.title=lvl.title;
    if(completed.includes(i))b.classList.add('done');
    if(i===currentLevel)b.classList.add('active');
    b.onclick=()=>renderLevel(i);
    rail.appendChild(b);
  });
  document.getElementById('totalScore').textContent=totalScore();
  document.getElementById('s10').textContent=count10();
  document.getElementById('s5').textContent=count5();
  document.getElementById('s2').textContent=count2();
}

function runQ(db,sql){try{return{ok:true,res:db.exec(sql)};}catch(e){return{ok:false,error:e.message};}}
function toRows(res){if(!res||!res.length)return{columns:[],values:[]};return{columns:res[0].columns,values:res[0].values};}
function norm(r,ord){let v=r.values.map(row=>row.map(c=>c===null?'NULL':String(c)));if(!ord)v=v.map(x=>x.join('|')).sort();else v=v.map(x=>x.join('|'));return JSON.stringify(v);}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function tbl(r){
  if(!r.columns.length)return'<div style="padding:10px;color:var(--text-dim);font-size:11px;">No rows returned.</div>';
  let h='<div class="resultset"><table class="rs"><thead><tr>';
  r.columns.forEach(c=>h+=`<th>${esc(c)}</th>`);
  h+='</tr></thead><tbody>';
  r.values.forEach(row=>{h+='<tr>'+row.map(v=>`<td>${v===null?'<i style="color:var(--text-dim)">NULL</i>':esc(String(v))}</td>`).join('')+'</tr>';});
  return h+'</tbody></table></div>';
}

function renderLevel(idx){
  currentLevel=idx;
  const lvl=LEVELS[idx];
  const skey=lvl.schemaOverride||lvl.schema;
  const schema=SCHEMAS[skey];
  const exDb=freshDb(skey);
  const exRes=runQ(exDb,lvl.example.query);
  const exRows=exRes.ok?toRows(exRes.res):{columns:[],values:[]};
  const app=document.getElementById('app');
  app.className='';
  app.innerHTML=`
<div class="card">
  <div class="topic-label">${esc(lvl.topic)}</div>
  <h2>Question ${idx+1} of ${LEVELS.length}</h2>
  <div class="lvl-title">${esc(lvl.title)}<span class="diff ${lvl.diff}">${lvl.diff}</span></div>
  <div class="example">
    <div class="label">Concept &amp; Example</div>
    <div class="ex-desc" style="margin-bottom:6px;">${lvl.concept}</div>
    <pre>${esc(lvl.example.query)}</pre>
    ${tbl(exRows)}
    <div class="ex-desc" style="margin-top:5px;">${lvl.example.note}</div>
  </div>
  <span class="schema-toggle" id="schemaToggle">▸ view table schema</span>
  <div class="schema-box" id="schemaBox">
    <div class="tbl-grid">
      ${schema.tables.map(t=>`<div class="tbl"><div class="tname">${t.name}</div>${t.cols.map(c=>{const[n,...r]=c.split(' ');return`<div class="col"><b>${n}</b> ${r.join(' ')}</div>`;}).join('')}</div>`).join('')}
    </div>
  </div>
  <div class="task">${lvl.task}</div>
  <div class="editor-wrap">
    <textarea id="sqlInput" spellcheck="false" placeholder="Write your SQL here… (Ctrl+Enter to run)"></textarea>
  </div>
  <div class="btn-row">
    <button class="run" id="runBtn">▶ Run &amp; Check</button>
    <button class="hint" id="hintBtn">💡 Hint (−5 pts)</button>
    <button class="reveal" id="revealBtn">🔓 Reveal (−8 pts)</button>
  </div>
  <div class="hint-box" id="hintBox"></div>
  <div class="result-area">
    <div class="feedback" id="feedback"></div>
    <div id="resultTable"></div>
    <div class="solution-box" id="solutionBox"><div class="label">Correct solution</div><pre id="solutionText"></pre></div>
  </div>
  <div class="next-row" id="nextRow"><button class="nextlvl" id="nextBtn">Next →</button></div>
</div>`;

  document.getElementById('schemaToggle').onclick=e=>{
    const b=document.getElementById('schemaBox');b.classList.toggle('open');
    e.target.textContent=b.classList.contains('open')?'▾ hide schema':'▸ view table schema';
  };
  document.getElementById('hintBtn').onclick=()=>{
    hintUsed[idx]=true;
    const kw=lvl.solution.match(/\b(SELECT|WHERE|GROUP BY|ORDER BY|JOIN|HAVING|LIKE|IN|BETWEEN|CASE|DISTINCT|LIMIT|INSERT|UPDATE|DELETE|ALTER|CREATE|UNION|TRIGGER|VIEW|BEGIN|COMMIT|EXISTS|AUTOINCREMENT|OFFSET|NOT EXISTS)\b/gi)||[];
    const hb=document.getElementById('hintBox');
    hb.textContent='Hint: this query uses — '+[...new Set(kw.map(k=>k.toUpperCase()))].join(', ')+'.';
    hb.classList.add('show');
  };
  document.getElementById('revealBtn').onclick=()=>{
    revealUsed[idx]=true;
    document.getElementById('solutionText').textContent=lvl.solution;
    document.getElementById('solutionBox').classList.add('show');
  };
  document.getElementById('runBtn').onclick=()=>checkAnswer(idx);
  document.getElementById('sqlInput').addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='Enter')checkAnswer(idx);});
  document.getElementById('nextBtn').onclick=()=>{if(idx+1<LEVELS.length)renderLevel(idx+1);};
  buildRail();buildSidebar();
}

function checkAnswer(idx){
  const lvl=LEVELS[idx];
  const skey=lvl.schemaOverride||lvl.schema;
  const userSql=document.getElementById('sqlInput').value.trim();
  const fb=document.getElementById('feedback');
  const rd=document.getElementById('resultTable');
  fb.className='feedback show';rd.innerHTML='';
  if(!userSql){fb.classList.add('err');fb.textContent='Write a query first.';return;}
  const uDb=freshDb(skey);
  const uRes=runQ(uDb,userSql);
  if(!uRes.ok){fb.classList.remove('ok','err');fb.classList.add('bad');fb.textContent='✕ SQL error: '+uRes.error;return;}
  const uRows=toRows(uRes.res);
  rd.innerHTML='<div style="font-size:10px;color:var(--text-dim);margin-bottom:5px;">Your result:</div>'+tbl(uRows);
  const rDb=freshDb(skey);
  const rRes=runQ(rDb,lvl.solution);
  const rRows=toRows(rRes.res);
  const same=norm(uRows,lvl.orderMatters)===norm(rRows,lvl.orderMatters);
  if(same){
    fb.classList.remove('bad','err');fb.classList.add('ok');
    const alreadyDone=completed.includes(idx);
    let pts=revealUsed[idx]?2:hintUsed[idx]?5:10;
    if(!alreadyDone){completed.push(idx);scores[idx]=pts;save();}
    const badge=pts===10?'🏆 +10':pts===5?'💡 +5':'📖 +2';
    fb.textContent=`✓ Correct! ${alreadyDone?'(already scored)':badge}`;
    document.getElementById('nextRow').classList.add('show');
    buildRail();buildSidebar();
  } else {
    fb.classList.remove('ok','err');fb.classList.add('bad');
    fb.textContent=lvl.orderMatters?'✕ Not quite — check columns, filter, or row order.':'✕ Not quite — check columns and filter conditions.';
  }
}

document.getElementById('randomBtn').onclick=()=>renderLevel(Math.floor(Math.random()*LEVELS.length));
boot();
</script>
